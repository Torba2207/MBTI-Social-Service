# Spring Application
spring.application.name=Backend
server.port=${SERVER_PORT}
server.address=${SERVER_ADDRESS}
app.client.url=${CLIENT_URL}
app.client.port=${CLIENT_PORT}
app.email.reset-password-url=http://${app.client.url}:${app.client.port}/reset-password?token=
app.email.confirm-email-url=http://localhost:${app.client.port}/confirm-email?token=

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.connection-timeout=600000
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
spring.security.user.name=${SPRING_NAME}
spring.security.user.password=${SPRING_PASSWORD}

# Session Configuration
server.servlet.session.cookie.name=MY_SESSION_COOKIE
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.tracking-modes=cookie
server.servlet.session.timeout=30m
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.session.redis.save-mode=on-set-attribute

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.email=${MAIL_USERNAME}@gmail.com
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# File Storage Configuration
minio.url=${MINIO_URL}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=user-profiles
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# API Documentation
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
image.default.path=default.png

# External Services
mbti.python.api.url=http://localhost:5000