spring.application.name=Backend

# Spring Data Source
spring.datasource.url=jdbc:postgresql://localhost:5432/MBTI_DATABASE
spring.datasource.username=mbtiadmin
spring.datasource.password=admin
spring.jpa.properties.hibernate.default_schema=mbti

# Spring Security
spring.security.user.name=Midax
spring.security.user.password=qwerty12345

# Spring Session
server.servlet.session.cookie.name=MY_SESSION_COOKIE
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=1m
server.servlet.session.tracking-modes=cookie
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.session.redis.save-mode=on-set-attribute

# Spring Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=""
spring.mail.password=""
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true