services:
  java-backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_ADDRESS=0.0.0.0
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql-db:5432/MBTI_DATABASE
      - SPRING_DATASOURCE_USERNAME=mbtiadmin
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - MAIL_USERNAME=mbtiservice2
      - MAIL_PASSWORD=byrubfwdszzxraxr
      - REDIS_HOST=redis-cache
      - REDIS_PORT=6379
      - SPRING_NAME=Midax
      - SPRING_PASSWORD=qwerty12345
      - CLIENT_URL=localhost
      - CLIENT_PORT=3000
      - MINIO_URL=http://minio-storage:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MBTI_PYTHON_API_URL=http://mbti-ai-service:5000
    depends_on:
      postgresql-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      minio-storage:
        condition: service_started

  react-frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "8081:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://java-backend:8080
    depends_on:
      - java-backend

  mbti-ai-service:
    build:
      context: ./TestMBTI
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - JAVA_API_BASE_URL=http://java-backend:8080
    depends_on:
      - java-backend

  postgresql-db:
    image: postgres:latest
    volumes:
      - postgresql-db-data:/var/lib/postgresql/data/pgdata
    environment:
      - POSTGRES_DB=MBTI_DATABASE
      - POSTGRES_USER=mbtiadmin
      - POSTGRES_PASSWORD=admin
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: postgres -c 'max_connections=500'
    restart: unless-stopped

  redis-cache:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-cache-data:/data

  minio-storage:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-storage-data:/data
    command: server /data --console-address ":9001"

volumes:
  postgresql-db-data:
    name: mbti-postgresql-db-data
  redis-cache-data:
    name: mbti-redis-cache-data
  minio-storage-data:
    name: mbti-minio-storage-data