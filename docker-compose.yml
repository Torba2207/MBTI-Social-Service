version: "3.8"

services:
  database:
    image: postgres:latest
    container_name: mbti_postgres_container
    restart: always
    environment:
      - POSTGRES_DB=MBTI_DATABASE
      - POSTGRES_USER=mbtiadmin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d

  redis:
    image: redis:alpine
    container_name: mbti_redis_container
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - redis-network
      
  minio:
    image: quay.io/minio/minio:latest
    container_name: mbti_minio_container
    ports:
      - "9000:9000"  # MinIO API Port
      - "9001:9001"  # MinIO Console Port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

networks:
  redis-network:
    driver: bridge

volumes:
  minio_data: